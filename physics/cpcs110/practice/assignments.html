    {id:"A4Q1", asgn:"A4", topic:"W ã Inelastic collision", title:"Two rocks collide & stick",
      tags:["#collision","#inelastic","#conservation","#momentum"],
      hint:[F.consP, F.pmv],
      stem:`Outer space: rock 1 $m_1=23$ kg, $\\vec v_1=\\langle 11,-23,0\\rangle$ m/s; rock 2 $m_2=43$ kg, $\\vec v_2=\\langle 28,6,0\\rangle$ m/s. They collide and stick. Final velocity?`,

        {l:"Momentum before", v:"$\\vec p_i=\\langle 1457,\\ -271,\\ 0\\rangle$ kgôñm/s"},
        {l:"Final velocity", v:"$\\vec v_f=\\langle 22.1,\\ -4.11,\\ 0\\rangle$ m/s"}
      ],
      fm:"$\\vec p_i=m_1\\vec v_1+m_2\\vec v_2;\\ \\vec v_f=\\vec p_i/(m_1+m_2)$"},

    {id:"A4Q2", asgn:"A4", topic:"W2.1 ã System momentum & impulse", title:"Momentum of a 2-object system",
      tags:["#momentum","#impulse","#system","#conservation"],
      hint:[F.consP, F.impulse],
      stem:`$A$ strikes $B$. Just before: $\\vec p_{A,i}=\\langle 23,-8,0\\rangle$, $\\vec p_{B,i}=\\langle 7,12,0\\rangle$ kgôñm/s.<br>(a) total initial $p$? (b) external impulse? (c) total final $p$? (d) $\\vec p_{B,f}$ if $\\vec p_{A,f}=\\langle 21,3,0\\rangle$?`,
      ans:[
        {l:"(a) Total initial", v:"$\\langle 30,\\ 4,\\ 0\\rangle$ kgôñm/s"},
        {l:"(b) External impulse", v:"$\\approx\\langle 0,0,0\\rangle$ Nôñs ã collision forces are internal"},
        {l:"(c) Total final", v:"$\\langle 30,\\ 4,\\ 0\\rangle$ kgôñm/s (conserved)"},
        {l:"(d) p of B after", v:"$\\vec p_{B,f}=\\langle 9,\\ 1,\\ 0\\rangle$ kgôñm/s"}
      ],
      fm:"$\\vec p_{sys}=\\vec p_A+\\vec p_B$ conserved; $\\vec p_{B,f}=\\vec p_{sys}-\\vec p_{A,f}$"},

    {id:"A4Q3", asgn:"A4", topic:"W2.1 ã System choice & öp", title:"Bowling balls: system vs surroundings",
      tags:["#momentum","#system","#conceptual","#collision"],
      hint:[F.consP, F.pmv],
      stem:`$m=7.5$ kg each. Ball $A$ at $\\langle 6,0,0\\rangle$ m/s hits $B$ (at rest); after, $A$ stops and $B$ moves $\\langle 6,0,0\\rangle$. Find $\\Delta\\vec p$ of the system and of the surroundings for system = A, B, both.`,

        {l:"System = B", v:"$\\Delta\\vec p_{sys}=\\langle 45,0,0\\rangle$, surroundings $=\\langle -45,0,0\\rangle$"},

      fm:"$\\vec p=m\\vec v$; system + surroundings = universe, so $\\Delta\\vec p_{surr}=-\\Delta\\vec p_{sys}$."},

    {id:"A4Q4", asgn:"A4", topic:"W ã Inelastic collision", title:"Clay lumps stick together",
      tags:["#collision","#inelastic","#conservation","#momentum"],
      hint:[F.consP, F.pmv],
      stem:`Two clay lumps, each $m=0.037$ kg, collide and stick. Just before: $\\vec v_1=\\langle 8,8,-5\\rangle$, $\\vec v_2=\\langle -5,0,-8\\rangle$ m/s.<br>(a) total $p$ before? (b) after? (c) final velocity?`,

        {l:"(c) Final velocity", v:"$\\vec v_f=\\langle 1.5,\\ 4,\\ -6.5\\rangle$ m/s"}

    {id:"A4Q5", asgn:"A4", topic:"W ã Friction (ö¥ã, ö¥ã)", title:"Friction on a block",
      tags:["#friction","#force","#normal-force"],
      hint:[F.normal, F.friction],
      stem:`A $4.2$ kg block on a table. A push up to $20.6$ N won't move it; once moving, $13.6$ N keeps it at constant speed. Find $\\mu_s$ and $\\mu_k$.`,
      ans:[

      ans:[

        {l:"Constant speed", v:"$\\vec f=\\langle 0,0,0\\rangle$ N ã springs squeezed straight down (symmetric)"},
        {l:"Speeding up", v:"$a=0.45$ m/sôý; $\\vec f=m\\vec a=\\langle 3.69,0,0\\rangle$ N (forward)"},

    {id:"A4Q7", asgn:"A4", topic:"W ã Oscillation period", title:"Spring period ã unknown mass",
      tags:["#oscillation","#spring","#period"],
      hint:[F.period],
      stem:`A $0.3$ kg mass on a spring has period $1.0$ s. With an unknown mass the period is $1.5$ s. Find the unknown mass.`,

      fm:"$T=2\\pi\\sqrt{m/k}\\Rightarrow T\\propto\\sqrt m;\\ m_2=m_1(T_2/T_1)^2$"},

    {id:"A4Q8", asgn:"A4", topic:"W ã Simple harmonic motion", title:"SHM position & timing",
      tags:["#oscillation","#spring","#shm"],
      hint:[F.omega, F.shm],
      stem:`$m=1.6$ kg, $k=170$ N/m, released from rest at $x=+0.06$ m at $t=0$.<br>(a) $x$ at $t=0.15$ s? (b) first time $x=0.03$ m?`,

      fm:"$\\omega=\\sqrt{k/m};\\ x=A\\cos\\omega t$ (released from rest at max displacement)."},

    {id:"A4Q9", asgn:"A4", topic:"W ã What changes the period", title:"Period vs amplitude & mass",

  ]
