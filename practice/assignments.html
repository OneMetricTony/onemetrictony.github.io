<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:#0e1116;color:#e6e9ef;line-height:1.45;
    -webkit-tap-highlight-color:transparent;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:520px;margin:0 auto;padding:12px 12px 90px}
  header{position:sticky;top:0;background:#0e1116ee;backdrop-filter:blur(8px);padding:10px 12px;margin:0 -12px 12px;border-bottom:1px solid #232a36;z-index:10}
  header .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  header .row .back{color:#9aa4b8;text-decoration:none;font-weight:600;font-size:13px;padding:6px 10px;background:#1a2030;border-radius:8px;border:1px solid #232a36}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:-.01em}
  .stats{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .stat{background:#1a2030;color:#9aa4b8;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:600}
  .stat strong{color:#e6e9ef}
  .stat.got{background:#0f2a1a;color:#4ade80}
  .stat.review{background:#2a2410;color:#fbbf24}
  .filters{display:flex;gap:6px;margin-top:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter{background:#1a2030;border:1px solid #232a36;color:#9aa4b8;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap}
  .filter.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
  .filter.a3 strong{color:#fbbf24}
  .tag-filter-bar{
    display:none;margin-top:8px;background:#1a1f2e;border:1px solid #3b82f6;border-radius:10px;
    padding:8px 12px;align-items:center;justify-content:space-between;gap:8px;font-size:13px;
  }
  .tag-filter-bar.show{display:flex}
  .tag-filter-bar .lbl{color:#9aa4b8;font-size:12px}
  .tag-filter-bar .clr{color:#60a5fa;background:transparent;border:none;font-size:18px;cursor:pointer;font-weight:700;padding:0 4px}
  .tag-filter-bar code{color:#60a5fa;font-weight:700;font-family:inherit}
  .card{
    background:#161b26;border:1.5px solid #232a36;border-radius:14px;padding:14px;margin-bottom:12px;
    transition:border-color .15s, background .15s;
  }
  .card.got{border-color:#22c55e;background:#0f1a14}
  .card.review{border-color:#fbbf24;background:#1a1810}
  .card .meta{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:11px;color:#9aa4b8;font-weight:600;letter-spacing:.04em;text-transform:uppercase;flex-wrap:wrap}
  .card .meta .asgn{background:#232a36;color:#cdd5e2;padding:2px 7px;border-radius:6px}
  .card .meta .asgn.a3{background:#3a2410;color:#fbbf24}
  .card .meta .asgn.a1, .card .meta .asgn.a2{background:#0f2a1a;color:#4ade80}
  .tags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 10px}
  .tag{
    background:#1a2030;border:1px solid #232a36;color:#8aa1c4;
    padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
  }
  .tag:active{transform:scale(.95)}
  .tag.hot{background:#1a2842;color:#60a5fa;border-color:#2a4980}
  .card .title{font-size:15px;font-weight:700;color:#fff;margin:0 0 8px}
  .card .stem{font-size:14.5px;color:#cdd5e2;margin:0 0 10px}
  .actions{display:flex;gap:8px;margin-bottom:10px}
  .hint-btn, .reveal-btn{
    flex:1;padding:11px;background:#1a2030;color:#e6e9ef;border:1.5px solid #232a36;
    border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
  }
  .hint-btn{background:#1a1f10;border-color:#3a4410;color:#fbbf24;flex:0 0 auto;padding:11px 14px}
  .hint-btn.open{background:#2a2410;border-color:#fbbf24}
  .hint-box{
    display:none;margin-bottom:10px;background:#1a1f10;border:1px solid #3a4410;border-radius:10px;
    padding:10px 12px;font-size:13.5px;color:#facc15;overflow-x:auto;
  }
  .hint-box.show{display:block}
  .hint-box .lbl{display:block;color:#a8a560;font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .hint-box .formula-line{margin:6px 0}
  .hint-box .formula-line .nm{color:#a8a560;font-size:11px;display:block;margin-bottom:2px}
  .card.got .reveal-btn, .card.review .reveal-btn{display:none}
  .card .solution{display:none;margin-top:6px}
  .card.opened .solution{display:block}
  .card.opened .reveal-btn{display:none}
  .ans-block{
    background:#0e1116;border:1px solid #1f2733;border-radius:10px;padding:10px 12px;margin:8px 0;font-size:14px;
    overflow-x:auto;
  }
  .ans-block .lbl{display:block;color:#9aa4b8;font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .formula{
    background:#1a1f10;border:1px solid #3a4410;border-radius:10px;padding:10px 12px;margin:10px 0 0;font-size:13.5px;color:#facc15;
    overflow-x:auto;
  }
  .formula .lbl{display:block;color:#a8a560;font-size:11px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .mark-row{display:flex;gap:8px;margin-top:10px}
  .mark{flex:1;padding:10px;border-radius:10px;font-size:13.5px;font-weight:600;font-family:inherit;cursor:pointer;border:1.5px solid;background:transparent}
  .mark.got{color:#4ade80;border-color:#22c55e44}
  .mark.got.active, .card.got .mark.got{background:#0f2a1a;border-color:#22c55e;color:#bbf7d0}
  .mark.review{color:#fbbf24;border-color:#fbbf2444}
  .mark.review.active, .card.review .mark.review{background:#2a2410;border-color:#fbbf24;color:#fde68a}
  .mark.reset{color:#9aa4b8;border-color:#232a36;flex:0 0 50px}
  mjx-container{font-size:1em !important;max-width:100%;overflow-x:auto;overflow-y:hidden}
  .empty{text-align:center;color:#9aa4b8;padding:40px 20px;font-size:14px}
  .ans-block code, .stem code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.93em}
  @media (max-width: 420px){
    .wrap{padding:10px 10px 90px}
    header{padding:9px 10px;margin:0 -10px 10px}
    .card{padding:12px}
    h1{font-size:15px}
    .hint-btn{padding:11px 12px;font-size:13px}

<script>
// Formula shorthand keyed by name — used so each Q can reference 1-2 by key from the FORMULA SHEET
const F = {
  unitVec:    {nm:"Unit vector",          t:"$\\hat r = \\dfrac{\\vec r}{|\\vec r|}$"},
  dirCos:     {nm:"Direction cosines",    t:"$\\hat r = \\langle \\cos\\theta_x,\\ \\cos\\theta_y,\\ \\cos\\theta_z\\rangle$"},
  posUpdate:  {nm:"Position update",      t:"$\\vec r_f = \\vec r_i + \\vec v_{avg}\\,\\Delta t$"},
  pmv:        {nm:"Momentum (low v)",     t:"$\\vec p = m\\vec v$"},
  pgmv:       {nm:"Relativistic momentum",t:"$\\vec p = \\gamma m\\vec v$"},
  gamma:      {nm:"Gamma factor",         t:"$\\gamma = \\dfrac{1}{\\sqrt{1-(|\\vec v|/c)^{2}}}$"},
  vFromP:     {nm:"v from p",             t:"$\\vec v = \\dfrac{\\vec p/m}{\\sqrt{1+(|\\vec p|/(mc))^{2}}}$"},
  Fma:        {nm:"Newton's 2nd",         t:"$\\sum\\vec F = m\\vec a$"},
  impulse:    {nm:"Momentum principle",   t:"$\\Delta\\vec p = \\vec F_{net}\\,\\Delta t$"},
  grav:       {nm:"Universal gravity",    t:"$\\vec F_{grav} = -G\\,\\dfrac{m_1 m_2}{|\\vec r|^{2}}\\,\\hat r$"},
  spring:     {nm:"Spring force",         t:"$\\vec F = -k_s\\,s\\,\\hat L$"},
  fg:         {nm:"Surface gravity force",t:"$F_g \\approx mg$"},
  gSurface:   {nm:"Surface g",            t:"$g = G\\dfrac{M}{R^{2}}$"},
  coulomb:    {nm:"Coulomb's law",        t:"$\\vec F_{elec} = \\dfrac{1}{4\\pi\\varepsilon_0}\\,\\dfrac{q_1 q_2}{|\\vec r|^{2}}\\,\\hat r$"},
  // Derived / utility (not literally on sheet but needed)
  magnitude:  {nm:"Vector magnitude",     t:"$|\\vec A| = \\sqrt{A_x^{2}+A_y^{2}+A_z^{2}}$"},
  delta:      {nm:"Displacement",         t:"$\\Delta\\vec r = \\vec r_f - \\vec r_i$"},
  vavg:       {nm:"Average velocity",     t:"$\\vec v_{avg} = \\dfrac{\\Delta\\vec r}{\\Delta t}$"},
  dp:         {nm:"Change in momentum",   t:"$\\Delta\\vec p = m(\\vec v_f - \\vec v_i)$"},
  consP:      {nm:"Conservation of p",    t:"$\\vec p_{tot,\\,i} = \\vec p_{tot,\\,f}$"},
  N3:         {nm:"Newton's 3rd law",     t:"$\\vec F_{A\\to B} = -\\vec F_{B\\to A}$"},
  stretch:    {nm:"Spring stretch",       t:"$s = |\\vec L| - L_0$"}
};

const Q = [
  {id:"A1Q1", asgn:"A1", topic:"W1.3 — Vectors", title:"Unit vector + scaling",
    tags:["#vectors","#unit-vector","#magnitude"],
    hint:[F.unitVec, F.magnitude],
    stem:`Part 1: Unit vector in direction of $\\vec A = \\langle 44,\\ 14,\\ -19\\rangle$ cm?<br>Part 2: $\\vec B$ in same direction with $|\\vec B|=250$ cm?`,
    ans:[
      {l:"(1) Unit vector", v:"$\\hat A = \\langle 0.881,\\ 0.280,\\ -0.381\\rangle$"},
      {l:"(2) Scaled to 250 cm", v:"$\\vec B = \\langle 220,\\ 70.1,\\ -95.1\\rangle$ cm"}
    ],
    fm:"$\\hat A = \\vec A / |\\vec A|;\\quad \\vec B = |B|\\,\\hat A$"},

  {id:"A1Q2", asgn:"A1", topic:"W1.3 — Displacement", title:"Drone navigation",
    tags:["#vectors","#unit-vector","#displacement"],
    hint:[F.unitVec, F.delta],
    stem:`Drone at origin. Fly along $\\langle 36, 52, -35\\rangle$ for 8 m; then along $\\langle -27, 12, -24\\rangle$ for 6 m.<br>Part 1: Final coordinates?<br>Part 2: Friend's drone at $\\langle 13, 20, 4\\rangle$ m — vector to fly to your spot?`,
    ans:[
      {l:"(1) Final position", v:"$\\langle -0.272,\\ 7.65,\\ -7.66\\rangle$ m"},
      {l:"(2) Friend → you", v:"$\\langle -13.3,\\ -12.4,\\ -11.7\\rangle$ m"}
    ],
    fm:"Step1 $=8\\hat u_1$, Step2 $=6\\hat u_2$. Sum for position. $\\Delta\\vec r=\\vec r_{you}-\\vec r_{friend}$."},

  {id:"A1Q3", asgn:"A1", topic:"W1.3 — Direction cosines", title:"End of a rod",
    tags:["#vectors","#direction-cosines"],
    hint:[F.dirCos],
    stem:`Rod length 6.1 m, one end at $\\langle 10, 18, -13\\rangle$ m. Angles with axes: $49^\\circ$ (+x), $50^\\circ$ (+y), $113^\\circ$ (+z). Location of far end?`,
    ans:[{l:"Far end", v:"$\\langle 14.0,\\ 21.9,\\ -15.4\\rangle$ m"}],
    fm:"$\\vec r_{far}=\\vec r_{near}+L\\langle\\cos\\theta_x,\\cos\\theta_y,\\cos\\theta_z\\rangle$"},

  {id:"A1Q4", asgn:"A1", topic:"W1.3 — Vector addition", title:"Graphical sum (MC)",
    tags:["#vectors","#conceptual"],
    hint:[F.delta],
    stem:`Which is correct? (a) $\\vec C = \\vec A + \\vec B$ &nbsp; (b) $\\vec C = \\vec A - \\vec B$ &nbsp; (c) $\\vec C = \\vec B - \\vec A$`,
    ans:[{l:"Answer", v:"(a) $\\vec C = \\vec A + \\vec B$"}],
    fm:"Head-to-tail rule for vector sum."},

  {id:"A1Q5", asgn:"A1", topic:"W1.3 — Vector subtraction", title:"Graphical subtraction (select all)",
    tags:["#vectors","#conceptual","#displacement"],
    hint:[F.delta],
    stem:`Which are correct? (i) $\\vec C=\\vec B-\\vec A$ &nbsp; (ii) $\\vec C=\\vec A+\\vec B$ &nbsp; (iii) $\\vec B=\\vec A+\\vec C$ &nbsp; (iv) $\\vec C=\\vec B+\\vec A$`,
    ans:[
      {l:"Correct", v:"✓ $\\vec C=\\vec B-\\vec A$ &nbsp;&nbsp; ✓ $\\vec B=\\vec A+\\vec C$"}
    ],
    fm:"$\\vec C=\\vec B-\\vec A \\Leftrightarrow \\vec B=\\vec A+\\vec C$ (head-to-tail)."},

  {id:"A1Q6", asgn:"A1", topic:"W1.4 — Average velocity", title:"Two-leg walk",
    tags:["#velocity","#avg-velocity","#unit-vector"],
    hint:[F.vavg, F.unitVec],
    stem:`Walk 24 m along $\\langle 1,0,0\\rangle$ at 2.5 m/s, then 15 m along $\\langle 1,0,1\\rangle/\\sqrt{2}$ at 2.7 m/s. Average velocity?`,
    ans:[{l:"Avg velocity", v:"$\\vec v_{avg}=\\langle 2.28,\\ 0,\\ 0.700\\rangle$ m/s"}],
    fm:"$\\vec v_{avg}=\\Delta\\vec r_{total}/\\Delta t_{total}$; $t_1=24/2.5$, $t_2=15/2.7$."},

  {id:"A1Q7", asgn:"A1", topic:"W2.1 — Newton's 1st law", title:"Net interaction (conceptual)",
    tags:["#newton-1st","#conceptual","#momentum-principle"],
    hint:[F.impulse],
    stem:`(a) Which objects are undergoing a net interaction?<br>(i) Book slides + stops &nbsp;(ii) Proton speeds up &nbsp;(iii) Car at constant speed on circular track &nbsp;(iv) Atom at rest in space &nbsp;(v) Spacecraft constant speed toward star<br>(b) Spaceship reaches $10^4$ m/s far from all objects, powers off. What happens?`,
    ans:[
      {l:"(a) Interacting", v:"✓ Book sliding &nbsp; ✓ Proton speeding up &nbsp; ✓ Car on circular track"},
      {l:"(b) After power off", v:"✓ Speed unchanged &nbsp; ✓ Moves in a straight line"}
    ],
    fm:"$\\vec v$ changes (magnitude OR direction) $\\Rightarrow \\vec F_{net}\\neq 0$."},

  {id:"A1Q8", asgn:"A1", topic:"W1.3 — Vectors", title:"Star → planet position",
    tags:["#vectors","#displacement","#unit-vector","#magnitude"],
    hint:[F.delta, F.unitVec, F.magnitude],
    stem:`Planet at $\\langle -2\\times10^{10}, 4\\times10^{10}, -2\\times10^{10}\\rangle$ m. Star at $\\langle 8\\times10^{10}, -7\\times10^{10}, 5\\times10^{10}\\rangle$ m.<br>(a) $\\vec r$ from star to planet? (b) $|\\vec r|$? (c) $\\hat r$?`,
    ans:[
      {l:"(a) Vector", v:"$\\vec r = \\langle -1.00\\times10^{11},\\ 1.10\\times10^{11},\\ -7.00\\times10^{10}\\rangle$ m"},
      {l:"(b) Magnitude", v:"$|\\vec r|=1.64\\times10^{11}$ m"},
      {l:"(c) Unit vector", v:"$\\hat r=\\langle -0.609,\\ 0.670,\\ -0.426\\rangle$"}
    ],
    fm:"$\\vec r=\\vec r_{planet}-\\vec r_{star};\\ |\\vec r|=\\sqrt{r_x^2+r_y^2+r_z^2};\\ \\hat r=\\vec r/|\\vec r|$"},

  {id:"A1Q9", asgn:"A1", topic:"W1.4 — Average velocity", title:"Slow neutron",
    tags:["#velocity","#avg-velocity"],
    hint:[F.vavg],
    stem:`Neutron from $\\langle 0.5,\\ -0.01,\\ 0.4\\rangle$ m to $\\langle -0.224,\\ 0.052,\\ 0.095\\rangle$ m in 2 µs.<br>(a) Average velocity? (b) Magnitude?`,
    ans:[
      {l:"(a) Avg velocity", v:"$\\vec v=\\langle -3.62\\times10^{5},\\ 3.10\\times10^{4},\\ -1.53\\times10^{5}\\rangle$ m/s"},
      {l:"(b) Magnitude", v:"$|\\vec v|=3.94\\times10^{5}$ m/s"}
    ],
    fm:"$\\vec v_{avg}=\\Delta\\vec r/\\Delta t$"},

  {id:"A1Q10", asgn:"A1", topic:"W1.4 — Position update", title:"Electron iterative",
    tags:["#position-update","#velocity","#avg-velocity"],
    hint:[F.posUpdate, F.vavg],
    stem:`Electron at $\\langle 0.02,\\ 0.04,\\ -0.06\\rangle$ m, then $\\langle 0.02,\\ 1.98,\\ -0.72\\rangle$ m 7 µs later.<br>(a) Avg velocity? (b) Position in another 11 µs?`,
    ans:[
      {l:"(a) Avg velocity", v:"$\\vec v_{avg}=\\langle 0,\\ 2.77\\times10^{5},\\ -9.43\\times10^{4}\\rangle$ m/s"},
      {l:"(b) New position", v:"$\\vec r=\\langle 0.0200,\\ 5.03,\\ -1.76\\rangle$ m"}
    ],
    fm:"$\\vec r_f=\\vec r_i+\\vec v_{avg}\\Delta t$"},

  {id:"A1Q11", asgn:"A1", topic:"W1.4 — Momentum", title:"Pitched baseball",
    tags:["#momentum","#non-rel-momentum"],
    hint:[F.pmv],
    stem:`Baseball mass 0.146 kg pitched at 75 mi/h $=$ 33.5 m/s. Momentum magnitude?`,
    ans:[{l:"Momentum", v:"$|\\vec p|=4.89$ kg·m/s"}],
    fm:"$|\\vec p|=m|\\vec v|$ (low speed)"},

  {id:"A1Q12", asgn:"A1", topic:"W2.1 — Acceleration", title:"Saturn V",
    tags:["#velocity","#newton-2nd"],
    hint:[F.Fma],
    stem:`Saturn V reached 2398 m/s at 168 s after liftoff.<br>(a) Avg acceleration (m/s²)? (b) In g's? ($g=9.8$ m/s²)`,
    ans:[
      {l:"(a) Acceleration", v:"$a=14.3$ m/s²"},
      {l:"(b) In g's", v:"$a/g=1.46$ g"}
    ],
    fm:"$a=\\Delta v/\\Delta t$"},

  {id:"A1Q13", asgn:"A1", topic:"W1.4 — Momentum + position", title:"Bowling ball",
    tags:["#momentum","#position-update"],
    hint:[F.pmv, F.posUpdate],
    stem:`5.5 kg ball with $\\vec p=\\langle 0.5,\\ 0,\\ 13.5\\rangle$ kg·m/s, starts at origin. Location after 2.1 s?`,
    ans:[{l:"Position", v:"$\\vec r=\\langle 0.191,\\ 0,\\ 5.15\\rangle$ m"}],
    fm:"$\\vec v=\\vec p/m;\\ \\vec r=\\vec v\\cdot t$"},

  {id:"A1Q14", asgn:"A1", topic:"W1.4 — Δp vs Δ|p|", title:"Tennis ball off a wall",
    tags:["#momentum","#impulse","#delta-p"],
    hint:[F.dp],
    stem:`Tennis ball mass 57 g. $\\vec v_i=\\langle 64,\\ 0,\\ 0\\rangle$ m/s, $\\vec v_f=\\langle -58,\\ 0,\\ 0\\rangle$ m/s.<br>(b) $\\Delta\\vec p$? (c) $|\\Delta\\vec p|$? (d) $\\Delta|\\vec p|$?`,
    ans:[
      {l:"(b) Vector change", v:"$\\Delta\\vec p=\\langle -6.95,\\ 0,\\ 0\\rangle$ kg·m/s"},
      {l:"(c) Magnitude of change", v:"$|\\Delta\\vec p|=6.95$ kg·m/s"},
      {l:"(d) Change of magnitude", v:"$\\Delta|\\vec p|=-0.342$ kg·m/s"}
    ],
    fm:"$\\Delta\\vec p=m(\\vec v_f-\\vec v_i)$; note $|\\Delta\\vec p|\\neq\\Delta|\\vec p|$ in general."},

  {id:"A1Q15", asgn:"A1", topic:"W1.4 — Relativistic momentum", title:"Fast electron",
    tags:["#relativistic","#gamma","#momentum","#rel-momentum"],
    hint:[F.pgmv, F.gamma],
    stem:`Electron at $|\\vec v|=0.995c$ ($c=3\\times10^{8}$ m/s) in direction $\\hat v=\\langle 0.422,\\ -0.527,\\ -0.738\\rangle$. Mass $9\\times10^{-31}$ kg.<br>(a) $\\gamma$? (b) Speed? (c) $|\\vec p|$? (d) $\\vec p$?`,
    ans:[
      {l:"(a) Gamma", v:"$\\gamma=10.0$"},
      {l:"(b) Speed", v:"$|\\vec v|=2.99\\times10^{8}$ m/s"},
      {l:"(c) Momentum magnitude", v:"$|\\vec p|=2.69\\times10^{-21}$ kg·m/s"},
      {l:"(d) Momentum vector", v:"$\\vec p=\\langle 1.14\\times10^{-21},\\ -1.42\\times10^{-21},\\ -1.98\\times10^{-21}\\rangle$ kg·m/s"}
    ],
    fm:"$\\vec p=\\gamma m\\vec v;\\ \\vec p=|\\vec p|\\hat v$"},

  {id:"A2Q1", asgn:"A2", topic:"W2.1 — Momentum Principle", title:"Net force, impulse, avg force",
    tags:["#force","#net-force","#impulse","#momentum-principle"],
    hint:[F.impulse],
    stem:`(1) Forces $\\langle 17,-10,39\\rangle$ N and $\\langle 23,-5,-28\\rangle$ N. Net force?<br>(2) Hockey puck $\\vec p_i=\\langle 0,0,29\\rangle$ kg·m/s comes to a stop. Impulse?<br>(3) Took 3 s. Avg force on puck?`,
    ans:[
      {l:"(1) Net force", v:"$\\vec F_{net}=\\langle 40.0,\\ -15.0,\\ 11.0\\rangle$ N"},
      {l:"(2) Impulse", v:"$\\vec J=\\langle 0,\\ 0,\\ -29.0\\rangle$ N·s"},
      {l:"(3) Avg force", v:"$\\vec F_{avg}=\\langle 0,\\ 0,\\ -9.67\\rangle$ N"}
    ],
    fm:"$\\vec F_{net}=\\sum\\vec F_i;\\ \\vec J=\\Delta\\vec p;\\ \\vec F_{avg}=\\vec J/\\Delta t$"},

  {id:"A2Q2", asgn:"A2", topic:"W2.1 — Momentum Principle", title:"Constant force update",

const STORE = "lucy_assignments_v1";

function loadState(){
  try {
    const raw = localStorage.getItem(STORE);
    if (!raw) return {marks:{},hints:{}};
    const s = JSON.parse(raw);
    if (!s || typeof s !== "object") return {marks:{},hints:{}};
    s.marks = s.marks || {};
    s.hints = s.hints || {};
    return s;
  } catch(e){ return {marks:{},hints:{}}; }
}
function saveState(s){
  try { localStorage.setItem(STORE, JSON.stringify(s)); } catch(e){}
}
let state = loadState();
let filter = "all";
let activeTag = null;
const list = document.getElementById("list");
const statsEl = document.getElementById("stats");
const tagBar = document.getElementById("tagBar");
const tagBarText = document.getElementById("tagBarText");
document.getElementById("tagClear").onclick = () => { activeTag = null; tagBar.classList.remove("show"); renderList(); };

function typeset(scope){
  if (window.MathJax && window.MathJax.typesetPromise){
    window.MathJax.typesetPromise([scope]).catch(()=>{});
  }
}

function renderStats(){
  const total = Q.length;
  const marks = state.marks;
  const got = Object.values(marks).filter(v => v === "got").length;
  const review = Object.values(marks).filter(v => v === "review").length;
  const seen = got + review;
  statsEl.innerHTML = `
    <div class="stat">Reviewed <strong>${seen}</strong>/${total}</div>
    <div class="stat got">Got it <strong>${got}</strong></div>
    <div class="stat review">Review <strong>${review}</strong></div>
  `;
}

function shouldShow(q){
  if (activeTag && !(q.tags || []).includes(activeTag)) return false;
  if (filter === "all") return true;
  if (filter === "todo") return !state.marks[q.id];
  return q.asgn === filter;
}

function setTagFilter(tag){
  activeTag = tag;
  if (tag){
    tagBar.classList.add("show");
    tagBarText.textContent = tag;
  } else {
    tagBar.classList.remove("show");
  }
  renderList();
  window.scrollTo({top:0, behavior:"smooth"});
}

function renderList(){
  list.innerHTML = "";
  let count = 0;
  Q.forEach(q => {
    if (!shouldShow(q)) return;
    count++;
    const mark = state.marks[q.id];
    const hintOpen = !!state.hints[q.id];
    const cls = mark === "got" ? "got" : (mark === "review" ? "review" : "");
    const card = document.createElement("div");
    card.className = `card ${cls}`;
    card.dataset.id = q.id;
    const tagsHtml = (q.tags || []).map(t => `<button class="tag${t===activeTag?' hot':''}" data-tag="${t}">${t}</button>`).join("");
    const hintHtml = (q.hint && q.hint.length) ? `
      <div class="hint-box ${hintOpen?'show':''}">
        <span class="lbl">Formula sheet — relevant entries</span>
        ${q.hint.map(h => `<div class="formula-line"><span class="nm">${h.nm}</span>${h.t}</div>`).join("")}
      </div>` : "";
    card.innerHTML = `
      <div class="meta">
        <span class="asgn ${q.asgn.toLowerCase()}">${q.asgn}</span>
        <span>${q.topic}</span>
      </div>
      <h3 class="title">${q.title}</h3>
      <div class="tags">${tagsHtml}</div>
      <div class="stem">${q.stem}</div>
      ${hintHtml}
      <div class="actions">
        ${q.hint && q.hint.length ? `<button class="hint-btn ${hintOpen?'open':''}">💡 ${hintOpen?'Hide':'Formula'}</button>` : ""}
        <button class="reveal-btn">Reveal solution</button>
      </div>
      <div class="solution">
        ${q.ans.map(a => `<div class="ans-block"><span class="lbl">${a.l}</span>${a.v}</div>`).join("")}
        ${q.fm ? `<div class="formula"><span class="lbl">Method</span>${q.fm}</div>` : ""}
        <div class="mark-row">
          <button class="mark got ${mark==='got'?'active':''}" data-mark="got">✓ Got it</button>
          <button class="mark review ${mark==='review'?'active':''}" data-mark="review">⚠ Review</button>
          <button class="mark reset" data-mark="reset">⟲</button>
        </div>
      </div>
    `;
    if (mark) card.classList.add("opened");
    list.appendChild(card);

    card.querySelectorAll(".tag").forEach(tg => {
      tg.onclick = (ev) => { ev.stopPropagation(); setTagFilter(tg.dataset.tag); };
    });
    const hintBtn = card.querySelector(".hint-btn");
    if (hintBtn){
      hintBtn.onclick = (ev) => {
        ev.stopPropagation();
        const box = card.querySelector(".hint-box");
        const willOpen = !box.classList.contains("show");
        box.classList.toggle("show");
        hintBtn.classList.toggle("open");
        hintBtn.innerHTML = willOpen ? "💡 Hide" : "💡 Formula";
        state.hints[q.id] = willOpen;
        saveState(state);
        if (willOpen) typeset(box);
      };
    }
    const revealBtn = card.querySelector(".reveal-btn");
    if (revealBtn){
      revealBtn.onclick = () => { card.classList.add("opened"); typeset(card); };
    }
    card.querySelectorAll(".mark").forEach(btn => {
      btn.onclick = (ev) => {
        ev.stopPropagation();
        const action = btn.dataset.mark;
        if (action === "reset"){ delete state.marks[q.id]; }
        else { state.marks[q.id] = action; }
        saveState(state);
        renderStats();
        renderList();
      };
    });
  });
  if (count === 0){
    list.innerHTML = `<div class="empty">No questions match the current filter${activeTag ? ` (tag ${activeTag})`:""}.</div>`;
  }
  typeset(list);
}

document.querySelectorAll(".filter").forEach(f => {
  f.onclick = () => {
    filter = f.dataset.f;
    document.querySelectorAll(".filter").forEach(x => x.classList.toggle("active", x === f));
    renderList();
  };
});

renderStats();
renderList();
</script>
