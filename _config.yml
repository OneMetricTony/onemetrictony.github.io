title: OneMetricTony Projects
description: Curriculum, sponsorship sites, and project artifacts.

# Use Cayman theme only on the /business/ subtree via include/exclude trick.
# Without a theme set repo-wide, .md files get bare HTML rendering.
# Setting theme here is opt-in via front matter (each curriculum .md will set layout).
remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

include:
  - README.md

# NOTE: do NOT add the static HTML site (index.html, physics/, FIRARobocup2026/,
# tony.*, flashcards.*) to `exclude` — Jekyll's `exclude` drops files from the
# built output entirely (404). These files contain no Liquid, so Jekyll copies
# them through as-is. Excluding them takes the whole site offline.

# Markdown defaults
defaults:
  - scope:
      path: "business"
    values:
      layout: default
