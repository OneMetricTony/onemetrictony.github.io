<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Kavosh team emblem">
  <defs>
    <linearGradient id="kav-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0394e"/>
      <stop offset="1" stop-color="#c8102e"/>
    </linearGradient>
  </defs>
  <!-- Outer chamfered hex shield -->
  <polygon points="100,6 168,40 188,108 148,180 52,180 12,108 32,40"
           fill="none" stroke="url(#kav-grad)" stroke-width="3"/>
  <!-- Inner beveled plate -->
  <polygon points="100,26 152,52 168,108 136,162 64,162 32,108 48,52"
           fill="#2a0a0a" stroke="#f0394e" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Corner notch brackets -->
  <path d="M100,26 L122,37 M100,26 L78,37" stroke="#f0394e" stroke-width="2"/>
  <!-- Stylized angular 'K' -->
  <path d="M70,60 L84,60 L84,92 L108,60 L126,60 L100,98 L128,140 L110,140 L88,108 L84,114 L84,140 L70,140 Z"
        fill="url(#kav-grad)"/>
  <!-- Segmented base ticks -->
  <g fill="#f0394e">
    <rect x="74" y="150" width="14" height="4"/>
    <rect x="93" y="150" width="14" height="4"/>
    <rect x="112" y="150" width="14" height="4"/>
  </g>
</svg>
